<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --accent3: #f472b6;
    --accent4: #fb923c;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; min-height: 100vh; }
  .shell { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem; }

  header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .logo-title { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: .15em; text-transform: uppercase; }
  .logo-name { font-size: 22px; font-weight: 500; color: var(--text); margin-top: 2px; }
  .race-chips-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .race-chip { background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: .55rem .9rem; text-align: right; min-width: 92px; }
  .race-chip.next { border-color: var(--accent); }
  .race-chip .days { font-family: var(--mono); font-size: 24px; font-weight: 500; color: var(--accent); line-height: 1; }
  .race-chip .race-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .race-chip .race-date { font-size: 9px; color: var(--muted); margin-top: 1px; font-family: var(--mono); }

  .range-row { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .range-btn { font-family: var(--mono); font-size: 11px; padding: 5px 12px; border-radius: 6px; border: 0.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; letter-spacing: .05em; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .range-btn.on { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 2rem; }
  .metric { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: .9rem 1rem; }
  .metric-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
  .metric-value { font-size: 24px; font-weight: 500; color: var(--text); line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .metric-value.green { color: var(--accent); }
  .metric-value.blue { color: var(--accent2); }
  .metric-value.pink { color: var(--accent3); }
  .metric-value.orange { color: var(--accent4); }

  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { font-family: var(--mono); font-size: 11px; padding: 9px 14px; border-radius: 6px 6px 0 0; border: none; background: transparent; color: var(--muted); cursor: pointer; letter-spacing: .05em; text-transform: uppercase; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .tab.on { color: var(--text); border-bottom-color: var(--accent); }

  .chart-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .chart-panel h3 { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 1rem; }
  .chart-wrap { position: relative; height: 220px; }

  .act-row { display: flex; align-items: center; gap: 10px; padding: .7rem .9rem; background: var(--surface2); border-radius: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .act-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .act-type { font-size: 13px; font-weight: 500; color: var(--text); min-width: 110px; text-transform: capitalize; }
  .act-stat { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .act-date { margin-left: auto; font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .plan-today-pin { background: #0a1f12; border: 1px solid var(--accent); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: 1.2rem; }
  .plan-today-pin::before { content: 'TODAY'; font-family: var(--mono); font-size: 9px; letter-spacing: .12em; color: var(--accent); display: block; margin-bottom: 6px; }
  .plan-phase-header { display: flex; align-items: center; gap: 10px; margin: 1.4rem 0 .6rem; }
  .plan-phase-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; flex: 1; padding-bottom: 4px; border-bottom: 0.5px solid var(--border); }
  .plan-history-toggle { font-family: var(--mono); font-size: 9px; color: var(--muted); cursor: pointer; background: none; border: 0.5px solid var(--border); border-radius: 5px; padding: 2px 8px; }
  .plan-history-toggle:hover { color: var(--text); border-color: var(--muted); }
  .plan-history-block { overflow: hidden; transition: max-height .35s ease; }
  .plan-history-block.collapsed { max-height: 0; }
  .plan-history-block.expanded { max-height: 9999px; }
  .plan-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: 7px; display: flex; gap: 12px; align-items: flex-start; }
  .plan-card.is-past { opacity: .55; }
  .plan-card.is-past.done-card { opacity: .7; }
  .plan-card.today { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(52,211,153,.08); }
  .plan-card.race-day { border-color: var(--accent4); background: #1a1510; }
  .plan-card.missed-card { border-color: #7f1d1d; }
  .plan-date-col { min-width: 78px; }
  .plan-date { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .plan-day { font-size: 12px; font-weight: 500; color: var(--text); margin-top: 2px; }
  .plan-content { flex: 1; min-width: 0; }
  .plan-badges { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 5px; }
  .plan-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .plan-detail { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .plan-note { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; opacity: .7; }
  .plan-badge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; display: inline-block; }
  .bz2 { background: #0d2e1e; color: var(--accent); }
  .bmx { background: #2a1a0a; color: var(--accent4); }
  .brs { background: #1e1e22; color: var(--muted); }
  .brc { background: #2a1205; color: var(--accent4); }
  .bmissed { background: #2d0a0a; color: #f87171; }
  .bdone { background: #0d2e1e; color: var(--accent); }
  .plan-segs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .plan-seg { font-size: 10px; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; border: 0.5px solid var(--border); color: var(--muted); }
  .plan-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .plan-done-btn { font-family: var(--mono); font-size: 10px; padding: 3px 10px; border-radius: 5px; cursor: pointer; border: 0.5px solid var(--border); background: transparent; color: var(--muted); }
  .plan-done-btn:hover { border-color: var(--accent); color: var(--accent); }
  .plan-done-btn.done { background: #0d2e1e; color: var(--accent); border-color: var(--accent); }
  .plan-missed-btn { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 5px; cursor: pointer; border: 0.5px solid #7f1d1d; background: transparent; color: #f87171; }
  .prog { margin-bottom: 1.5rem; }
  .prog-labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 5px; }
  .prog-bar { height: 3px; background: var(--surface2); border-radius: 2px; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; }

  .updated { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; margin-bottom: 1rem; }
  .status { text-align: center; padding: 3rem; font-family: var(--mono); font-size: 12px; color: var(--muted); }

  .plan-done-btn, .plan-missed-btn, .plan-history-toggle { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

  @media(max-width:600px) {
    body { -webkit-text-size-adjust: 100%; }
    .shell { padding: 1.25rem .85rem; }
    .logo-name { font-size: 19px; }
    .metrics { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .metric-value { font-size: 20px; }
    .plan-card { flex-direction: column; gap: 6px; }
    .plan-date-col { display: flex; gap: 6px; align-items: baseline; min-width: 0; }
    .chart-wrap { height: 190px; }
    .race-chip { min-width: 78px; padding: .45rem .7rem; }
    .race-chip .days { font-size: 20px; }
    .plan-done-btn, .plan-missed-btn { padding: 6px 12px; font-size: 11px; }
    .tab { padding: 10px 12px; font-size: 10.5px; }
    .act-row { padding: .6rem .7rem; }
    .act-date { margin-left: 0; width: 100%; order: 5; }
  }

  @media(max-width:380px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .race-chip .days { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div>
      <div class="logo-title">Running dashboard</div>
      <div class="logo-name">Good morning 👋</div>
    </div>
    <div class="race-chips-row" id="raceChips"></div>
  </header>

  <div class="updated" id="updatedLabel">Fetching data...</div>

  <div class="range-row">
    <button class="range-btn" data-range="7">7D</button>
    <button class="range-btn on" data-range="30">30D</button>
    <button class="range-btn" data-range="90">90D</button>
  </div>

  <div id="statusMsg" class="status">Loading your Garmin data...</div>

  <div id="mainContent" style="display:none">
    <div class="metrics" id="metricsGrid"></div>

    <div class="tabs">
      <button class="tab on" data-tab="activities">Activities</button>
      <button class="tab" data-tab="sleep">Sleep</button>
      <button class="tab" data-tab="hrv">HRV</button>
      <button class="tab" data-tab="plan">Race plan</button>
      <button class="tab" data-tab="volume">Weekly volume</button>
      <button class="tab" data-tab="training">Training status</button>
    </div>

    <div id="tabContent"></div>
  </div>

</div>

<script>
/* ============================================================
   DATA SOURCE
   Your export script writes these CSV/JSON files straight into
   the repo root. Since index.html lives in the SAME repo, we
   fetch them as plain relative paths — no raw.githubusercontent
   URL, no separate data repo, no auth needed.
   ============================================================ */
const FILES = ['activities.csv', 'sleep.csv', 'hrv.csv'];
const TRAINING_STATUS_FILE = 'training_status.json';

/* ============================================================
   RACES — add/edit events here. Order doesn't matter, the
   dashboard sorts and shows the soonest upcoming one first.
   ============================================================ */
const RACES = [
  { title: 'Chester Metric Marathon', short: 'Chester', date: '2026-10-11', distance: '26.2km', goal: 'Goal 2:30' },
  { title: 'London Marathon', short: 'London', date: '2027-04-25', distance: '42.2km', goal: 'Sub-5:00 (7:06/km avg)' }
];

/* ============================================================
   RACE PLAN
   Two blocks: Chester Metric Marathon build (Jul–Oct 2026, 3
   sessions/week: Mon/Thu/Sat) then London Marathon build
   (Nov 2026–Apr 2027, 4 sessions/week: Mon/Wed/Thu/Sat).
   Change PHASE1_START or LONDON_START below and every date in
   that block recalculates automatically.
   Each day: { date, day, type, badge, title, detail, segs:[...], km, note }
   type controls the badge colour: bz2 (easy/long/aerobic), bmx
   (tempo/intervals), brs (rest/very light), brc (race day)
   ============================================================ */
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
}
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function dayName(dateStr) { return DAY_NAMES[new Date(dateStr + 'T00:00:00Z').getUTCDay()]; }
function mkDay(date, type, badge, title, detail, km, segs, note) {
  return { date, day: dayName(date), type, badge, title, detail, segs: segs || [], km: km || 0, note: note || '' };
}
function weekRangeLabel(monday) {
  const fmt = d => new Date(d + 'T00:00:00Z').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  return `${fmt(monday)}\u2013${fmt(addDays(monday, 6))}`;
}
/* Mon/Wed/Thu/Sat template used throughout the London block */
function mkFourDayWeek(monday, phase, weekName, long, mon, wed, thu, note) {
  return { label: `${phase} \u2014 ${weekName} \u2014 ${weekRangeLabel(monday)}`, phase, days: [
    mkDay(monday, 'bz2', 'Easy', `Easy run \u2014 ${mon}km`, `${mon}km easy pace.`, mon, [`${mon}km easy`]),
    mkDay(addDays(monday, 2), 'bz2', 'Recovery', `Recovery run \u2014 ${wed}km`, `${wed}km very easy recovery pace.`, wed, [`${wed}km recovery`]),
    mkDay(addDays(monday, 3), 'bmx', 'Tempo', `Tempo run \u2014 ${thu}km`, `${thu}km at tempo effort.`, thu, [`${thu}km tempo`]),
    mkDay(addDays(monday, 5), 'bz2', 'Long Run', `Long run \u2014 ${long}km`, `${long}km steady long run.`, long, [`${long}km long`], note || '')
  ]};
}

/* ── Chester Metric Marathon build ── */
const PHASE1_START = '2026-07-13'; // Monday, Week 1
const wk = n => addDays(PHASE1_START, 7 * n);

const chesterWeeks = [
  { label: `Phase 1 \u2014 Week 1 \u2014 Base Build \u2014 ${weekRangeLabel(wk(0))}`, phase: 'Phase 1', days: [
    mkDay(wk(0), 'bz2', 'Easy', 'Easy run \u2014 5km', '5km easy pace.', 5, ['5km easy']),
    mkDay(addDays(wk(0),3), 'bmx', 'Tempo', '6km \u2014 2km easy + 3km tempo + 1km easy', 'Warm up easy, 3km at tempo effort, cool down easy.', 6, ['2km easy','3km tempo','1km easy']),
    mkDay(addDays(wk(0),5), 'bz2', 'Long Run', 'Long run \u2014 16km', '16km steady long run.', 16, ['16km long'])
  ]},
  { label: `Phase 1 \u2014 Week 2 \u2014 Base Build \u2014 ${weekRangeLabel(wk(1))}`, phase: 'Phase 1', days: [
    mkDay(wk(1), 'bz2', 'Easy', 'Easy run \u2014 5km', '5km easy pace.', 5, ['5km easy']),
    mkDay(addDays(wk(1),3), 'bmx', 'Tempo', '7km \u2014 4km tempo', '7km total with 4km at tempo effort.', 7, ['3km easy','4km tempo']),
    mkDay(addDays(wk(1),5), 'bz2', 'Long Run', 'Long run \u2014 17km', '17km steady long run.', 17, ['17km long'])
  ]},
  { label: `Phase 1 \u2014 Week 3 \u2014 Base Build \u2014 ${weekRangeLabel(wk(2))}`, phase: 'Phase 1', days: [
    mkDay(wk(2), 'bz2', 'Easy', 'Easy run \u2014 6km', '6km easy pace.', 6, ['6km easy']),
    mkDay(addDays(wk(2),3), 'bmx', 'Intervals', '7km \u2014 5\u00d7800m tempo effort', '7km total including 5 x 800m at tempo effort with easy recovery.', 7, ['5x800m tempo']),
    mkDay(addDays(wk(2),5), 'bz2', 'Long Run', 'Long run \u2014 18km', '18km steady long run.', 18, ['18km long'])
  ]},
  { label: `Phase 1 \u2014 Week 4 (Recovery) \u2014 Base Build \u2014 ${weekRangeLabel(wk(3))}`, phase: 'Phase 1', days: [
    mkDay(wk(3), 'bz2', 'Easy', 'Easy run \u2014 5km', '5km easy pace.', 5, ['5km easy']),
    mkDay(addDays(wk(3),3), 'bz2', 'Easy', 'Easy run \u2014 6km', '6km easy pace, no tempo this week.', 6, ['6km easy']),
    mkDay(addDays(wk(3),5), 'bz2', 'Long Run', 'Long run \u2014 15km', '15km easy long run \u2014 recovery week.', 15, ['15km long'], 'Recovery week \u2014 keep effort easy across all three sessions.')
  ]},
  { label: `Phase 2 \u2014 Week 5 \u2014 Endurance Build \u2014 ${weekRangeLabel(wk(4))}`, phase: 'Phase 2', days: [
    mkDay(wk(4), 'bz2', 'Easy', 'Easy run \u2014 6km', '6km easy pace.', 6, ['6km easy']),
    mkDay(addDays(wk(4),3), 'bmx', 'Tempo', 'Tempo run \u2014 8km', '8km at tempo effort.', 8, ['8km tempo']),
    mkDay(addDays(wk(4),5), 'bz2', 'Long Run', 'Long run \u2014 19km', '19km steady long run.', 19, ['19km long'])
  ]},
  { label: `Phase 2 \u2014 Week 6 \u2014 Endurance Build \u2014 ${weekRangeLabel(wk(5))}`, phase: 'Phase 2', days: [
    mkDay(wk(5), 'bz2', 'Easy', 'Easy run \u2014 6km', '6km easy pace.', 6, ['6km easy']),
    mkDay(addDays(wk(5),3), 'bmx', 'Tempo', '8km \u2014 4km tempo', '8km total with 4km at tempo effort.', 8, ['4km easy','4km tempo']),
    mkDay(addDays(wk(5),5), 'bz2', 'Long Run', 'Long run \u2014 20km', '20km steady long run.', 20, ['20km long'])
  ]},
  { label: `Phase 2 \u2014 Week 7 \u2014 Endurance Build \u2014 ${weekRangeLabel(wk(6))}`, phase: 'Phase 2', days: [
    mkDay(wk(6), 'bz2', 'Easy', 'Easy run \u2014 7km', '7km easy pace.', 7, ['7km easy']),
    mkDay(addDays(wk(6),3), 'bmx', 'Intervals', '9km \u2014 6\u00d71km tempo', '9km total including 6 x 1km at tempo effort with easy recovery.', 9, ['6x1km tempo']),
    mkDay(addDays(wk(6),5), 'bz2', 'Long Run', 'Long run \u2014 22km', '22km steady long run.', 22, ['22km long'])
  ]},
  { label: `Phase 2 \u2014 Week 8 (Recovery) \u2014 Endurance Build \u2014 ${weekRangeLabel(wk(7))}`, phase: 'Phase 2', days: [
    mkDay(wk(7), 'bz2', 'Easy', 'Easy run \u2014 5km', '5km easy pace.', 5, ['5km easy']),
    mkDay(addDays(wk(7),3), 'bz2', 'Easy', 'Easy run \u2014 6km', '6km easy pace, no tempo this week.', 6, ['6km easy']),
    mkDay(addDays(wk(7),5), 'bz2', 'Long Run', 'Long run \u2014 18km', '18km easy long run \u2014 recovery week.', 18, ['18km long'], 'Recovery week \u2014 keep effort easy across all three sessions.')
  ]},
  { label: `Peak Phase \u2014 Week 9 \u2014 ${weekRangeLabel(wk(8))}`, phase: 'Peak Phase', days: [
    mkDay(wk(8), 'bz2', 'Easy', 'Easy run \u2014 7km', '7km easy pace.', 7, ['7km easy']),
    mkDay(addDays(wk(8),3), 'bmx', 'Tempo', 'Tempo run \u2014 9km', '9km at tempo effort.', 9, ['9km tempo']),
    mkDay(addDays(wk(8),5), 'bz2', 'Long Run', 'Long run \u2014 23km', '23km steady long run.', 23, ['23km long'])
  ]},
  { label: `Peak Phase \u2014 Week 10 \u2014 ${weekRangeLabel(wk(9))}`, phase: 'Peak Phase', days: [
    mkDay(wk(9), 'bz2', 'Easy', 'Easy run \u2014 7km', '7km easy pace.', 7, ['7km easy']),
    mkDay(addDays(wk(9),3), 'bz2', 'Steady', 'Run \u2014 10km', '10km steady effort.', 10, ['10km steady']),
    mkDay(addDays(wk(9),5), 'bz2', 'Long Run', 'Long run \u2014 24km', '24km steady long run.', 24, ['24km long'])
  ]},
  { label: `Peak Phase \u2014 Week 11 (Peak) \u2014 ${weekRangeLabel(wk(10))}`, phase: 'Peak Phase', days: [
    mkDay(wk(10), 'bz2', 'Easy', 'Easy run \u2014 7km', '7km easy pace.', 7, ['7km easy']),
    mkDay(addDays(wk(10),3), 'bmx', 'Goal Pace', '10km \u2014 5km at goal pace', '10km total including 5km at goal race pace.', 10, ['5km easy','5km @ goal pace']),
    mkDay(addDays(wk(10),5), 'bz2', 'Long Run', 'Long run \u2014 26km', '26km \u2014 biggest long run of the block.', 26, ['26km long'], 'Peak week \u2014 highest volume before taper begins.')
  ]},
  { label: `Taper \u2014 Week 12 \u2014 ${weekRangeLabel(wk(11))}`, phase: 'Taper', days: [
    mkDay(wk(11), 'bz2', 'Easy', 'Easy run \u2014 6km', '6km easy pace.', 6, ['6km easy']),
    mkDay(addDays(wk(11),3), 'bz2', 'Steady', 'Run \u2014 7km', '7km steady effort.', 7, ['7km steady']),
    mkDay(addDays(wk(11),5), 'bz2', 'Long Run', 'Long run \u2014 18km', '18km \u2014 volume dropping into taper.', 18, ['18km long'])
  ]},
  { label: `Race Week \u2014 ${weekRangeLabel(wk(12))}`, phase: 'Race Week', days: [
    mkDay(wk(12), 'bz2', 'Easy', 'Easy run \u2014 5km', '5km easy pace, shake the legs out.', 5, ['5km easy']),
    mkDay(addDays(wk(12),3), 'bz2', 'Strides', '4km with strides', '4km easy with a few relaxed strides to stay sharp.', 4, ['4km + strides']),
    mkDay(addDays(wk(12),5), 'brs', 'Rest', 'Rest', 'Full rest \u2014 day before race day.', 0, []),
    mkDay(addDays(wk(12),6), 'brc', 'Race Day', 'Chester Metric Marathon \u2014 26km', 'Race day. Goal: 2:30.', 26, ['26km race'], 'Goal 2:30.')
  ]},
  { label: `Recovery After Chester \u2014 Week 1 \u2014 ${weekRangeLabel(wk(13))}`, phase: 'Recovery', days: [
    mkDay(wk(13), 'brs', 'Walk', 'Walk', 'Easy walk only \u2014 no running.', 0, ['Walk only']),
    mkDay(addDays(wk(13),3), 'bz2', 'Easy', 'Easy run \u2014 5km', '5km easy pace.', 5, ['5km easy']),

function localToday() {
  const now = new Date();
  return now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
}
function cutoff(n) { const d = new Date(); d.setDate(d.getDate()-n); return d; }
function filterRows(rows, field, n) {
  const c = cutoff(n);
  return (rows||[]).filter(r => r[field] && new Date(r[field]) >= c).sort((a,b) => a[field] > b[field] ? 1 : -1);
}
function avg(arr) { const f = arr.filter(v => !isNaN(v)); return f.length ? Math.round((f.reduce((a,b)=>a+b,0)/f.length)*10)/10 : 0; }
function findCol(row, opts) { if (!row) return null; for (const o of opts) if (row[o] !== undefined) return o; return null; }

/* ── CSV parser (handles comma or tab separated, matches Garmin export format) ── */
function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  if (lines.length < 2) return [];
  const delim = lines[0].includes('\t') ? '\t' : ',';
  const hdrs = lines[0].split(delim).map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    if (delim === '\t') {
      const vals = line.split('\t');
      const o = {};
      hdrs.forEach((h,i) => o[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
      return o;
    }
    const vals = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += c;
    }
    vals.push(cur);
    const o = {};
    hdrs.forEach((h,i) => o[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
    return o;
  });
}

/* ── normalize raw Garmin CSV rows into the field names the dashboard uses ── */
function normalizeActivities(rows) {
  return rows.map(r => {
    const type = (r.activityType_typeKey || r.activityType || r.activityName || 'activity');
    return {
      date: (r.startTimeLocal || '').slice(0,10),
      type,
      distanceKm: (parseFloat(r.distance) || 0) / 1000,
      durationMin: (parseFloat(r.duration) || 0) / 60,
      avgHr: r.averageHR ? Math.round(+r.averageHR) : null
    };
  }).filter(a => a.date);
}
function normalizeSleep(rows) {
  const col = findCol(rows[0], ['sleepTimeSeconds','dailySleepDTO_sleepTimeSeconds','totalSleepTimeInSeconds']);
  return rows.map(r => ({ date: r.date, hours: col ? +(+r[col]/3600).toFixed(1) : 0 })).filter(r => r.date);
}
function normalizeHRV(rows) {
  return rows.map(r => ({
    date: r.date,
    value: +r['hrvSummary_lastNightAvg'] || 0,
    weeklyAvg: +r['hrvSummary_weeklyAvg'] || 0,
    baselineLow: +r['hrvSummary_baseline_balancedLow'] || 0,
    baselineHigh: +r['hrvSummary_baseline_balancedUpper'] || 0
  })).filter(r => r.date);
}
function normalizeTrainingStatus(d) {
  if (!d) return null;
  const deviceKey = Object.keys(d).find(k => k.includes('latestTrainingStatusData') && k.endsWith('trainingStatusFeedbackPhrase'));
  const prefix = deviceKey ? deviceKey.replace('trainingStatusFeedbackPhrase','') : '';
  const statusRaw = d[prefix + 'trainingStatusFeedbackPhrase'] || '';
  const lbKey = Object.keys(d).find(k => k.includes('trainingBalanceFeedbackPhrase'));
  const loadFocusRaw = lbKey ? d[lbKey] : '';
  const acwrStatus = d[prefix + 'acuteTrainingLoadDTO_acwrStatus'] || '';
  const statusLabels = { RECOVERY_1:'Recovery', RECOVERY_2:'Recovery', MAINTAINING_1:'Maintaining', MAINTAINING_2:'Maintaining', PRODUCTIVE_1:'Productive', PRODUCTIVE_2:'Productive', PEAKING_1:'Peaking', PEAKING_2:'Peaking', OVERREACHING_1:'Overreaching', OVERREACHING_2:'Overreaching', UNPRODUCTIVE:'Unproductive', DETRAINING:'Detraining' };
  const loadLabels = { ANAEROBIC_SHORTAGE:'Anaerobic Shortage', ANAEROBIC_EXCESS:'Anaerobic Excess', AEROBIC_LOW_SHORTAGE:'Aerobic Low Shortage', AEROBIC_HIGH_SHORTAGE:'Aerobic High Shortage', AEROBIC_LOW_EXCESS:'Aerobic Low Excess', AEROBIC_HIGH_EXCESS:'Aerobic High Excess', OPTIMAL:'Optimal Balance', BALANCED:'Balanced' };
  const titleCase = s => (s||'').replace(/_/g,' ').replace(/\w/g,c=>c.toUpperCase());
  return {
    statusLabel: statusLabels[statusRaw] || titleCase(statusRaw) || '—',
    loadFocus: loadLabels[loadFocusRaw] || titleCase(loadFocusRaw) || '—',
    acwrLabel: titleCase(acwrStatus) || '—',
    acuteLoad: d[prefix + 'acuteTrainingLoadDTO_dailyTrainingLoadAcute'] || '—',
    chronicLoad: d[prefix + 'acuteTrainingLoadDTO_dailyTrainingLoadChronic'] || '—',
    aerobicLow: d[Object.keys(d).find(k => k.includes('monthlyLoadAerobicLow') && !k.includes('Target'))] || 0,
    aerobicHigh: d[Object.keys(d).find(k => k.includes('monthlyLoadAerobicHigh') && !k.includes('Target'))] || 0,
    anaerobic: d[Object.keys(d).find(k => k.includes('monthlyLoadAnaerobic') && !k.includes('Target'))] || 0,
    vo2max: d['mostRecentVO2Max_generic_vo2MaxValue'] || '—',
    vo2maxPrecise: d['mostRecentVO2Max_generic_vo2MaxPreciseValue'] || ''
  };
}

/* ── load ── */
async function loadAll() {
  try {
    const results = await Promise.all(FILES.map(f =>
      fetch(f + '?t=' + Date.now()).then(r => r.ok ? r.text() : '').then(t => t ? parseCSV(t) : []).catch(() => [])
    ));
    D.activities = normalizeActivities(results[0]);
    D.sleep = normalizeSleep(results[1]);
    D.hrv = normalizeHRV(results[2]);

    try {
      const tsRes = await fetch(TRAINING_STATUS_FILE + '?t=' + Date.now());
      D.trainingStatus = tsRes.ok ? normalizeTrainingStatus(await tsRes.json()) : null;
    } catch (e) { D.trainingStatus = null; }

    if (!D.activities.length && !D.sleep.length) {
      document.getElementById('statusMsg').textContent = 'No data found. Check your GitHub Actions workflow has run and the CSVs exist in the repo root.';
      return;
    }
    document.getElementById('statusMsg').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    document.getElementById('updatedLabel').textContent = 'Data loaded';
    renderMetrics();
    showTab('activities');
  } catch (e) {
    document.getElementById('statusMsg').textContent = 'Error loading data: ' + e.message;
  }
}

/* ── metrics ── */
function renderMetrics() {

/* ── chart helper ── */
function makeChart(id, type, labels, datasets, extraOpts={}) {
  if (chart) chart.destroy();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  chart = new Chart(ctx, {
    type, data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 14 }, grid: { color: '#1e2026' } },
        y: { ticks: { color: '#6b7280', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        ...extraOpts
      }
    }
  });
}

/* ── tabs ── */
function showTab(name) {
  curTab = name;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b.dataset.tab === name));
  const el = document.getElementById('tabContent');
  if (chart) { chart.destroy(); chart = null; }

  if (name === 'activities') return renderActivities(el);
  if (name === 'plan') return renderPlan(el);
  if (name === 'volume') return renderVolume(el);
  if (name === 'training') return renderTraining(el);
  if (name === 'sleep') return renderTrendChart(el, 'Sleep duration (hours)', D.sleep, 'hours', '#f472b6', 'bar');

}

      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem">Monthly load breakdown</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <div class="metric"><div class="metric-label">Aerobic low</div><div class="metric-value" style="font-size:16px">${Math.round(d.aerobicLow||0)}</div><div class="metric-sub">zone 1-2</div></div>
        <div class="metric"><div class="metric-label">Aerobic high</div><div class="metric-value" style="font-size:16px">${Math.round(d.aerobicHigh||0)}</div><div class="metric-sub">zone 3-4</div></div>
        <div class="metric"><div class="metric-label">Anaerobic</div><div class="metric-value" style="font-size:16px">${Math.round(d.anaerobic||0)}</div><div class="metric-sub">zone 5</div></div>
      </div>
    </div>`;
}

/* ── race plan state (stored locally in the browser) ── */
let planDone = {}, planMissed = {}, planHistoryOpen = {};
try { planDone = JSON.parse(localStorage.getItem('racePlanDone') || '{}'); } catch(e) {}
try { planMissed = JSON.parse(localStorage.getItem('racePlanMissed') || '{}'); } catch(e) {}
function savePlanState() {
  try {
    localStorage.setItem('racePlanDone', JSON.stringify(planDone));
    localStorage.setItem('racePlanMissed', JSON.stringify(planMissed));
  } catch(e) {}
}
function flatPlanDays() { const days=[]; planWeeks.forEach(w=>w.days.forEach(d=>days.push({...d,weekLabel:w.label,phase:w.phase}))); return days; }
function totalPlanSessions() { let t=0; planWeeks.forEach(w=>w.days.forEach(d=>{ if(d.type!=='brs') t++; })); return t; }
function donePlanCount() { return Object.values(planDone).filter(Boolean).length; }

function togglePlanDone(key) {
  planDone[key] = !planDone[key];
  if (planDone[key]) delete planMissed[key];
  savePlanState();
  renderPlan(document.getElementById('tabContent'));
}
function markMissed(key, title) {
  planMissed[key] = title;
  delete planDone[key];
  savePlanState();
  renderPlan(document.getElementById('tabContent'));
}
function unmarkMissed(key) {
  delete planMissed[key];
  savePlanState();
  renderPlan(document.getElementById('tabContent'));
}
function toggleHistory(weekKey) {
  planHistoryOpen[weekKey] = !planHistoryOpen[weekKey];
  const block = document.getElementById('history-'+weekKey);
  const btn = document.getElementById('histbtn-'+weekKey);
  if (block) { block.classList.toggle('collapsed', !planHistoryOpen[weekKey]); block.classList.toggle('expanded', !!planHistoryOpen[weekKey]); }
  if (btn) btn.textContent = planHistoryOpen[weekKey] ? '▲ hide history' : '▼ show history';
}

function renderPlan(el) {
  const today = localToday();
  const isPast = d => d < today;
  const isToday2 = d => d === today;
  function fmtDate(ds) { const [y,m,dd] = ds.split('-').map(Number); return new Date(y,m-1,dd).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }

  function buildCard(d, pinned) {
    const isDone = !!planDone[d.date];
    const isMissed = !!planMissed[d.date];
    const isRace = d.type === 'brc';
    const isPast2 = isPast(d.date);
    const isTod = isToday2(d.date);
    const isActionable = d.type !== 'brs' && !isRace;
    const safeTitle = d.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    let cls = 'plan-card';
    if (isTod && !pinned) cls += ' today';
    if (isRace) cls += ' race-day';
    if (isMissed) cls += ' missed-card';
    if (isPast2 && !isTod) cls += ' is-past';
    if (isPast2 && isDone) cls += ' done-card';
    const badges = `<span class="plan-badge ${d.type}">${d.badge}</span>`
      + (isDone ? '<span class="plan-badge bdone">✓ Done</span>' : '')
      + (isMissed ? '<span class="plan-badge bmissed">✗ Missed</span>' : '');
    const segsHtml = d.segs && d.segs.length ? `<div class="plan-segs">${d.segs.map(s=>`<span class="plan-seg">${s}</span>`).join('')}</div>` : '';
    const noteHtml = d.note ? `<div class="plan-note">${d.note}</div>` : '';
    let actionsHtml = '';
    if (isActionable && !isMissed) {
      actionsHtml = `<div class="plan-actions">
        <button class="plan-done-btn${isDone?' done':''}" data-action="done" data-date="${d.date}">${isDone?'✓ Completed':'Mark done'}</button>
        ${(isPast2||isTod)&&!isDone ? `<button class="plan-missed-btn" data-action="missed" data-date="${d.date}" data-title="${safeTitle}">✗ Missed</button>` : ''}
      </div>`;
    } else if (isMissed) {
      actionsHtml = `<div class="plan-actions"><button class="plan-missed-btn" data-action="undo" data-date="${d.date}">↩ Undo</button></div>`;
    }
    return `<div class="${cls}">
      <div class="plan-date-col"><div class="plan-date">${fmtDate(d.date)}</div><div class="plan-day">${isTod&&!pinned?d.day+' · Today':d.day}</div></div>
      <div class="plan-content"><div class="plan-badges">${badges}</div><div class="plan-title">${d.title}</div><div class="plan-detail">${d.detail}</div>${segsHtml}${noteHtml}${actionsHtml}</div>
    </div>`;
  }

  const total = totalPlanSessions(), done = donePlanCount(), pct = total ? Math.round((done/total)*100) : 0;
  const missedCount = Object.keys(planMissed).length;
  let html = `<div class="prog">
    <div class="prog-labels"><span>${done} of ${total} sessions done${missedCount>0?` &middot; <span style="color:#f87171">${missedCount} missed</span>`:''}</span><span>${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>`;

  let todayEntry = null;
  planWeeks.forEach(w => w.days.forEach(d => { if (d.date === today) todayEntry = d; }));
  if (todayEntry) {
    html += `<div class="plan-today-pin">${buildCard(todayEntry, true)}</div>`;
  } else {
    const all = flatPlanDays();
    const next = all.find(d => d.date > today);
    if (next) html += `<div class="plan-today-pin" style="border-color:var(--border)"><div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px">NEXT SESSION</div>${buildCard(next, true)}</div>`;
  }

  planWeeks.forEach((w, wi) => {
    const weekEnd = w.days.length ? w.days[w.days.length-1].date : '';
    const weekContainsToday = w.days.some(d => isToday2(d.date));
    const weekIsEntirelyPast = weekEnd < today;
    const histKey = 'w'+wi;
    const isOpen = !!planHistoryOpen[histKey];
    html += `<div class="plan-phase-header"><span class="plan-phase-label">${w.label}</span>
      ${weekIsEntirelyPast ? `<button class="plan-history-toggle" id="histbtn-${histKey}" data-action="history" data-wk="${histKey}">${isOpen?'▲ hide history':'▼ show history'}</button>` : ''}
    </div>`;
    if (weekIsEntirelyPast) {
      html += `<div class="plan-history-block ${isOpen?'expanded':'collapsed'}" id="history-${histKey}">`;
      w.days.forEach(d => html += buildCard(d, false));
      html += '</div>';
    } else {
      w.days.forEach(d => { if (!(weekContainsToday && isToday2(d.date))) html += buildCard(d, false); });
    }
  });

  el.innerHTML = html;
}

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { action, date, title, wk } = btn.dataset;
  if (action === 'done') togglePlanDone(date);
  if (action === 'missed') markMissed(date, title||'');
  if (action === 'undo') unmarkMissed(date);
  if (action === 'history') toggleHistory(wk);
});

document.addEventListener('click', e => {
  const btn = e.target.closest('.range-btn');
  if (!btn) return;
  days = Number(btn.dataset.range);
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('on', b === btn));
  renderMetrics();
  showTab(curTab);
});

document.addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  showTab(btn.dataset.tab);
});

loadAll();
</script>
</body>
</html>
